[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Long-cache fingerprinted assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — `public/_redirects` already covers this, but kept here for clarity.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
